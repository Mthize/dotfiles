# Plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'tmux-plugins/tmux-yank'

# Prefix — choose ONE block only
# unbind C-b
# set -g prefix `
# bind ` send-prefix

# If you want C-Space instead, use this and delete the block above:
unbind C-b
set -g prefix C-Space
bind C-Space send-prefix

# TPM helpers
bind -n M-i run-shell '~/.tmux/plugins/tpm/bin/install_plugins'
bind -n M-r source-file ~/.config/tmux/tmux.conf \; display-message "Config reloaded"

# General options
set -g mouse on
set -g escape-time 0
set -g repeat-time 1000
set -g renumber-windows on
set -g base-index 1
set -g pane-base-index 1

# True color — keep one approach
set -as terminal-features ",xterm-256color:RGB"

# Copy mode (vim-style)
setw -g mode-keys vi
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi C-v send-keys -X rectangle-toggle
bind-key -T copy-mode-vi y send-keys -X copy-selection-and-cancel

# Window switching
bind -n M-H previous-window
bind -n M-L next-window
bind -n C-Tab next-window
bind -n C-S-Tab previous-window

bind -n M-1 select-window -t :1
bind -n M-2 select-window -t :2
bind -n M-3 select-window -t :3
bind -n M-4 select-window -t :4
bind -n M-5 select-window -t :5
bind -n M-6 select-window -t :6
bind -n M-7 select-window -t :7
bind -n M-8 select-window -t :8
bind -n M-9 select-window -t :9

# Pane movement
bind l select-pane -U
bind j select-pane -L
bind h select-pane -D
bind l select-pane -R

bind -r W resize-pane -U
bind -r A resize-pane -L
bind -r S resize-pane -D
bind -r D resize-pane -R

bind Up select-pane -U
bind Left select-pane -L
bind Down select-pane -D
bind Right select-pane -R

bind -n M-w select-pane -U
bind -n M-a select-pane -L
bind -n M-s select-pane -D
bind -n M-d select-pane -R
bind -n M-f resize-pane -Z

# Splits
bind h split-window -h
bind | split-window -h
bind v split-window -v
bind - split-window -v

# Other keybinds
bind f resize-pane -Z
bind q detach-client
bind e choose-window -Z

# Theme
set -g pane-border-lines simple
set -g pane-border-style "fg=black"
set -g pane-active-border-style "fg=magenta"

set -g status-position top
set -g status-left-length 100
set -g status-style "fg=#D8DEE9,bg=default"
set -g status-left ""
set -g status-right "#[fg=brightblack]#S"

# Theme: status (windows)
set -g window-status-format "●"
set -g window-status-current-format "●"

set -g window-status-current-style "#{?window_zoomed_flag,fg=yellow,fg=magenta\#,nobold}"
set -g window-status-bell-style "fg=red,nobold"

# Sesh
bind-key "T" run-shell "sesh connect \"$(
  sesh list --icons | fzf-tmux -p 80%,70% \
    --no-sort --ansi --border-label ' sesh ' --prompt '⚡  ' \
    --header '  ^a all ^t tmux ^g configs ^x zoxide ^d tmux kill ^f find' \
    --bind 'tab:down,btab:up' \
    --bind 'ctrl-a:change-prompt(⚡  )+reload(sesh list --icons)' \
    --bind 'ctrl-t:change-prompt(🪟  )+reload(sesh list -t --icons)' \
    --bind 'ctrl-g:change-prompt(⚙️  )+reload(sesh list -c --icons)' \
    --bind 'ctrl-x:change-prompt(📁  )+reload(sesh list -z --icons)' \
    --bind 'ctrl-f:change-prompt(🔎  )+reload(fd -H -d 2 -t d -E .Trash . ~)' \
    --bind 'ctrl-d:execute(tmux kill-session -t {2..})+change-prompt(⚡  )+reload(sesh list --icons)' \
    --preview-window 'right:55%' \
    --preview 'sesh preview {}'
)\""

# TPM must stay last
run '~/.tmux/plugins/tpm/tpm'
